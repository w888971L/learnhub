{% if unread_notification_count and unread_notification_count > 0 %}
  <span class="absolute -top-1 -right-1 inline-flex items-center justify-center h-5 min-w-[1.25rem] px-1 rounded-full bg-red-500 text-white text-xs font-bold leading-none">
    {% if unread_notification_count > 99 %}
      99+
    {% else %}
      {{ unread_notification_count }}
    {% endif %}
  </span>
{% endif %}
